<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Trợ Lí Ẩm Thực </title>
    
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <div class="project-info">
        <div class="info-card">
            <div class="course-name">MÔN HỌC: Các nền tảng phát triển phần mềm</div>
            <hr>
            <div class="teacher-name">
                 <strong>Giảng viên hướng dẫn:</strong> </br>
                    👨‍🏫<span>ThS. Trần Kim Mỹ Vân</span>
            </div>
            <strong>Thành viên nhóm:</strong> </br>
            <div class="team-box">
                <div class="team-title">AI Project Team</div>

                <div class="member">
                    <img src="{{ url_for('static', filename='anh1.jpg') }}">
                    <span>Đỗ Hoàng Phúc - 2474802010313</span>
                </div>
            <hr>
                <div class="member">
                    <img src="{{ url_for('static', filename='anh2.jpg') }}">
                    <span>Huỳnh Hữu Phúc - 2474802010314</span>
                </div>
            </div>
        </div>
    </div>
    <div class="fixed-logo-container">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Phở Việt Logo" class="main-logo-img">
        </div>
    </div>
    <style>
        /* 2. CẤU HÌNH CSS CHO BACKGROUND ĐỘNG */
        #tsparticles {
            position: fixed; /* Cố định background */
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; /* Đẩy ra sau cùng */
            background-color: #fdf2e9; /* Màu nền gốc nếu particles không tải được */
        }

        /* 3. ĐẢM BẢO CHAT CONTAINER NỔI LÊN TRÊN */
        body {
            position: relative;
            z-index: 0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Ngăn cuộn trang chính */
        }

        .chat-container {
            z-index: 10; /* Nổi lên trên particles */
            /* Thêm độ mờ nhẹ cho container để nhìn xuyên thấu background (tùy chọn) */
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(5px); /* Làm mờ nhẹ phần particles phía sau container */
        }

        /* Thêm CSS cho hiệu ứng loading nhấp nháy */
        .typing {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #e67e22;
            border-radius: 50%;
            margin-right: 3px;
            animation: typingAnimation 1s infinite ease-in-out;
        }
        .typing:nth-child(2) { animation-delay: 0.2s; }
        .typing:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnimation {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        .loading-msg {
            display: flex;
            align-items: center;
            gap: 5px;
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <div class="chat-container">
        <div class="chat-header">
            <img src="{{ url_for('static', filename='ảnh.png') }}" alt="Logo Phở Việt" class="ai-logo-img">
            <h2>🍳 Trợ Lý Ẩm Thực</h2>
            <button onclick="clearHistory()" class="btn-clear">Xóa lịch sử</button> 
            <button onclick="startNewChat()" class="btn-new-chat">
                    <i class="fas fa-plus"></i> Trò chuyện mới
                </button>
         </div>

        <div id="historyList" class="history-bar"></div>

        <div id="chatWindow" class="chat-window">
            <div class="message ai-msg">
                Chào bạn! Tôi là trợ lý AI chuyên về ẩm thực. Bạn muốn nấu món gì hôm nay?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Nhập tên món ăn hoặc đặt câu hỏi...">
            <button id="sendBtn">Gửi</button>
        </div>
        
    </div>

    <script>
        // 5. CẤU HÌNH VÀ KHỞI TẠO TSPARTICLES
        tsParticles.load("tsparticles", {
            fpsLimit: 60,
            particles: {
                number: {
                    value: 80, // Số lượng hạt
                    density: {
                        enable: true,
                        area: 800
                    }
                },
                color: {
                    value: "#e67e22" // Màu của hạt (màu cam thương hiệu của bạn)
                },
                shape: {
                    type: "circle" // Hình dạng hạt
                },
                opacity: {
                    value: 0.3, // Độ mờ của hạt
                    random: true
                },
                size: {
                    value: { min: 1, max: 5 }, // Kích thước hạt
                    random: true
                },
                links: {
                    enable: true, // Nối các hạt lại với nhau
                    distance: 150,
                    color: "#e67e22",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true, // Cho phép hạt di chuyển
                    speed: 1,
                    direction: "none",
                    random: true,
                    straight: false,
                    outModes: "out"
                }
            },
            interactivity: {
                events: {
                    onHover: {
                        enable: true, // Hiệu ứng khi di chuột qua
                        mode: "grab" // Hạt hút về phía chuột
                    },
                    onClick: {
                        enable: true, // Hiệu ứng khi click chuột
                        mode: "push" // Thêm hạt mới
                    }
                },
                modes: {
                    grab: {
                        distance: 140,
                        links: {
                            opacity: 0.5
                        }
                    },
                    push: {
                        quantity: 4
                    }
                }
            },
            detectRetina: true
        });

        // --- Giữ nguyên logic chat và lịch sử cũ của bạn ---
        let currentDish = "";

        const scrollToBottom = () => {
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        };

        const appendMessage = (role, text) => {
            const chatWindow = document.getElementById('chatWindow');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-msg`;
            msgDiv.innerHTML = marked.parse(text);
            chatWindow.appendChild(msgDiv);
            scrollToBottom();
        };

        const handleSendMessage = async () => {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const chatWindow = document.getElementById('chatWindow');
            const content = input.value.trim();
            
            if (!content || btn.disabled) return;

            appendMessage('user', content);
            input.value = "";
            
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "message ai-msg loading-msg";
            loadingDiv.innerHTML = `
                <div class="typing"></div>
                <div class="typing"></div>
                <div class="typing"></div>
                <span>Trợ Lý Ẩm Thực đang suy nghĩ...</span>
            `;
            chatWindow.appendChild(loadingDiv);
            scrollToBottom();

            const endpoint = currentDish ? '/chat' : '/cook';
            const body = currentDish ? { dish: currentDish, message: content } : { dish: content };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                loadingDiv.remove();

                // Tìm đoạn này trong code của bạn và cập nhật:
            if (data.error) {
                appendMessage('ai', `❌ **Lỗi:** ${data.error}`);
            } else {
                const reply = data.recipe || data.reply;
                appendMessage('ai', reply);
                
                // NẾU LÀ MÓN MỚI (CHƯA CÓ TRONG LỊCH SỬ)
                if (!currentDish) {
                    currentDish = data.dish; // Gán món hiện tại
                    loadHistory();           // Cập nhật ngay danh sách bên phải
                }
            }
            } catch (err) {
                if(loadingDiv) loadingDiv.remove();
                appendMessage('ai', `❌ **Lỗi kết nối:** ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        };

        document.getElementById('sendBtn').addEventListener('click', handleSendMessage);

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendMessage();
        });

        function saveToHistory(dish) {
            let history = JSON.parse(localStorage.getItem('cookingHistory')) || [];
            if (!history.includes(dish)) {
                history.unshift(dish);
                localStorage.setItem('cookingHistory', JSON.stringify(history.slice(0, 5)));
                displayHistory();
            }
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('cookingHistory')) || [];
            const rightContainer = document.getElementById('rightHistoryList');
            
            // Hiển thị ở cột bên phải
            if (rightContainer) {
                rightContainer.innerHTML = history.map(item => 
                    `<div class="history-item" onclick="startNewDish('${item}')" title="${item}">
                        🍽️ ${item}
                    </div>`
                ).join('');
            }

            // Nếu bạn vẫn muốn giữ thanh tag ngang ở header chat thì giữ lại dòng này:
            const topContainer = document.getElementById('historyList');
            if (topContainer) {
                topContainer.innerHTML = history.map(item => 
                    `<span class="hist-tag" onclick="startNewDish('${item}')">${item}</span>`
                ).join('');
            }
        }
        async function clearHistory() {
    // Hiện thông báo xác nhận để tránh bấm nhầm
    if (!confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử trò chuyện không?")) return;

    try {
        // 1. Gọi Server để xóa file JSON
        const response = await fetch('/clear_history', { method: 'POST' });
        const data = await response.json();

        if (data.status === 'success') {
            // 2. Xóa sạch biến tạm trong JS
            currentDish = ""; 

            // 3. Xóa sạch giao diện cột lịch sử bên phải
            const container = document.getElementById('rightHistoryList');
            if (container) {
                container.innerHTML = '<p style="text-align:center; color:#999; font-size:13px;">Đã xóa lịch sử</p>';
            }

            // 4. Xóa sạch khung chat hiện tại và đưa về lời chào mặc định
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.innerHTML = `
                <div class="message ai-msg">
                    Đã xóa toàn bộ lịch sử. Bạn muốn bắt đầu nấu món gì mới không?
                </div>
            `;

            // 5. Nếu bạn có dùng localStorage cũ thì xóa luôn
            localStorage.removeItem('cookingHistory');
            
            console.log("Đã xóa sạch lịch sử trên cả Server và Client.");
        } else {
            alert("Lỗi khi xóa: " + data.error);
        }
    } catch (error) {
        console.error("Lỗi kết nối:", error);
        alert("Không thể kết nối với máy chủ để xóa lịch sử.");
    }
}

        displayHistory();
        async function loadHistory() {
    try {
        const response = await fetch('/history');
        const historyData = await response.json();
        const container = document.getElementById('rightHistoryList');
        
        if (!container) return;

        if (historyData.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; font-size:13px;">Chưa có lịch sử</p>';
            return;
        }

        container.innerHTML = historyData.map(item => `
            <div class="history-item" onclick="loadPreviousChat('${item.dish}')" style="cursor:pointer;">
                <strong>🍽️ ${item.dish}</strong>
                <br>
                <small style="font-size: 11px; color: #777;">${item.timestamp}</small>
            </div>
        `).join('');
    } catch (error) {
        console.error("Lỗi tải lịch sử từ server:", error);
    }
}
// 1. Hàm để reset cuộc trò chuyện mới
function startNewChat() {
    // 1. Reset biến theo dõi món ăn về rỗng
    currentDish = ""; 
    
    // 2. Làm sạch cửa sổ chat và hiện lời chào mới
    const chatWindow = document.getElementById('chatWindow');
    chatWindow.innerHTML = `
        <div class="message ai-msg">
            Chào bạn! Tôi đã sẵn sàng hỗ trợ món mới. Hôm nay bạn muốn nấu gì nào?
        </div>
    `;
    
    // 3. Xóa nội dung trong ô nhập liệu
    document.getElementById('userInput').value = '';
    
    console.log("Đã bắt đầu phiên trò chuyện mới.");
}

// 2. Hàm để tải lại nội dung chat cũ từ Server khi bấm vào cột phải
async function loadPreviousChat(dishName) {
    try {
        const response = await fetch(`/get_chat_detail/${encodeURIComponent(dishName)}`);
        const data = await response.json();
        
        if (data.history) {
            currentDish = dishName; // QUAN TRỌNG: Gán món này làm hiện tại để hỏi tiếp được
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.innerHTML = ''; // Xóa trắng màn hình hiện tại
            
            data.history.forEach(msg => {
                // Sử dụng hàm appendMessage sẵn có của bạn
                appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content);
            });
        }
    } catch (error) {
        console.error("Lỗi khi tải chi tiết chat:", error);
    }
}

// Thêm dòng này ở cuối phần script
window.addEventListener('DOMContentLoaded', (event) => {
    loadHistory(); // Tự động load lịch sử từ server khi mở trang/F5
});
    </script>
<aside class="right-sidebar">
    <div class="history-card">
        <div class="history-header">
            <i class="fas fa-history"></i> Lịch sử tìm kiếm
        </div>
        <div id="rightHistoryList" class="history-items-container"></div>
        <button onclick="clearHistory()" class="btn-clear-history">Xóa tất cả</button>
    </div>
</aside>

</body>
</html>
